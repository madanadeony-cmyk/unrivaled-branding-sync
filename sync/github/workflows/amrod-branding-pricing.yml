name: Sync Amrod Branding Pricing

on:
  workflow_dispatch: {}

jobs:
  sync_pricing:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_API_VERSION: "2026-01"

      # ✅ Set this in repo secrets or hardcode in the script
      AMROD_PRICING_ENDPOINT: ${{ secrets.AMROD_PRICING_ENDPOINT }}

      # If your amrod.js token fetch uses env vars, keep those secrets too:
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run pricing sync
        working-directory: amrod-branding-sync
        run: node pricing-sync.js
