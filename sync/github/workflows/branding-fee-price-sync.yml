name: Sync Amrod Branding Prices

on:
  workflow_dispatch: {}

jobs:
  branding-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Shopify
      SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_API_VERSION: "2026-01"

      # Amrod
      AMROD_USERNAME: ${{ secrets.AMROD_USERNAME }}
      AMROD_PASSWORD: ${{ secrets.AMROD_PASSWORD }}
      AMROD_CUSTOMER_CODE: ${{ secrets.AMROD_CUSTOMER_CODE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch branding prices from Amrod
        working-directory: amrod-branding-sync
        run: node branding-fetch.js

      - name: Sync branding prices to Shopify
        working-directory: amrod-branding-sync
        run: node branding-sync-shopify.js
